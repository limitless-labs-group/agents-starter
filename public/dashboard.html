<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limitless Agent Dashboard</title>
<style>
  :root {
    --bg: #0a0a0f; --bg1: #111118; --bg2: #16161f; --border: #1e1e2a;
    --text: #c8c8d4; --dim: #666; --dim2: #444;
    --green: #00e87b; --green-dim: #003d22; --red: #ff4466; --red-dim: #3a0015;
    --amber: #ffaa00; --amber-dim: #332200; --blue: #4488ff; --purple: #9966ff;
    --cyan: #00cccc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace;
    background: var(--bg); color: var(--text);
    padding: 24px; max-width: 1400px; margin: 0 auto; font-size: 13px;
    line-height: 1.5;
  }

  /* Header */
  .header { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .header h1 { font-size:1.1em; font-weight:700; color:var(--green); letter-spacing:-0.5px; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 6px var(--green)}50%{opacity:.4;box-shadow:none} }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s ease infinite; flex-shrink:0; }
  .dot.dead { background:var(--red); animation:none; }
  .meta { font-size:.7em; color:var(--dim2); margin-bottom:20px; display:flex; gap:14px; flex-wrap:wrap; }
  .meta a { color:var(--dim); text-decoration:none; }
  .meta a:hover { color:var(--green); }

  /* Section headers */
  .sh { font-size:.6em; text-transform:uppercase; letter-spacing:2px; color:var(--dim2); font-weight:700; margin-bottom:8px; }

  /* Grid layouts */
  .kpi-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px; }

  /* KPI cards */
  .kpi { background:var(--bg1); border:1px solid var(--border); border-radius:6px; padding:14px 12px; text-align:center; }
  .kpi-val { font-size:1.8em; font-weight:800; line-height:1.2; }
  .kpi-label { font-size:.55em; color:var(--dim2); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }
  .kpi-sub { font-size:.65em; color:var(--dim); margin-top:2px; }
  .kpi.glow-green { border-color:rgba(0,232,123,.25); background:linear-gradient(180deg,rgba(0,232,123,.04),var(--bg1)); }
  .kpi.glow-red { border-color:rgba(255,68,102,.25); background:linear-gradient(180deg,rgba(255,68,102,.04),var(--bg1)); }

  /* Panels */
  .panel { background:var(--bg1); border:1px solid var(--border); border-radius:6px; padding:14px; overflow:hidden; }
  .panel-title { font-size:.65em; text-transform:uppercase; letter-spacing:1.5px; color:var(--dim2); font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .panel-title .count { color:var(--dim); font-weight:400; }

  /* Tables */
  table { width:100%; border-collapse:collapse; font-size:.75em; }
  th { text-align:left; color:var(--dim2); padding:4px 6px; border-bottom:1px solid var(--border); font-size:.65em; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
  td { padding:5px 6px; border-bottom:1px solid rgba(30,30,42,.5); }
  tr:hover td { background:var(--bg2); }
  .empty-msg { text-align:center; padding:20px; color:var(--dim2); font-size:.8em; }

  /* Badges */
  .badge { display:inline-block; padding:1px 7px; border-radius:3px; font-size:.7em; font-weight:700; }
  .b-yes { background:var(--green-dim); color:var(--green); }
  .b-no { background:var(--red-dim); color:var(--red); }
  .b-pending { background:var(--amber-dim); color:var(--amber); }
  .b-blue { background:rgba(68,136,255,.12); color:var(--blue); }
  .b-purple { background:rgba(153,102,255,.12); color:var(--purple); }
  .b-ok { background:var(--green-dim); color:var(--green); }
  .b-err { background:var(--red-dim); color:var(--red); }

  /* Colors */
  .g { color:var(--green); } .r { color:var(--red); } .a { color:var(--amber); }
  .bl { color:var(--blue); } .p { color:var(--purple); } .d { color:var(--dim); }
  .cy { color:var(--cyan); }
  a { color:var(--blue); text-decoration:none; } a:hover { color:var(--green); }

  /* Chart */
  #pnl-chart { height:160px; position:relative; }

  /* Strategy config */
  .config-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:6px; }
  .config-item { display:flex; justify-content:space-between; padding:4px 8px; background:var(--bg2); border-radius:3px; font-size:.75em; }
  .config-key { color:var(--dim); }
  .config-val { color:var(--cyan); font-weight:600; }

  /* Bar charts */
  .bar-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:.75em; }
  .bar-label { width:50px; text-align:right; color:var(--dim); font-weight:600; flex-shrink:0; }
  .bar-track { flex:1; height:18px; background:var(--bg); border-radius:2px; overflow:hidden; display:flex; }
  .bar-w { height:100%; background:linear-gradient(90deg,var(--green-dim),rgba(0,232,123,.35)); display:flex; align-items:center; padding-left:4px; font-size:.7em; color:var(--green); font-weight:600; min-width:2px; }
  .bar-l { height:100%; background:linear-gradient(90deg,var(--red-dim),rgba(255,68,102,.35)); display:flex; align-items:center; padding-left:4px; font-size:.7em; color:var(--red); font-weight:600; min-width:2px; }
  .bar-stat { width:110px; text-align:right; flex-shrink:0; font-size:.7em; color:var(--dim); }

  /* Scrollable table wrapper */
  .scroll-wrap { max-height:280px; overflow-y:auto; }
  .scroll-wrap::-webkit-scrollbar { width:4px; }
  .scroll-wrap::-webkit-scrollbar-track { background:var(--bg1); }
  .scroll-wrap::-webkit-scrollbar-thumb { background:var(--dim2); border-radius:2px; }

  /* Responsive */
  @media(max-width:900px) { .kpi-grid{grid-template-columns:repeat(3,1fr)} .two-col,.three-col{grid-template-columns:1fr} }
  @media(max-width:500px) { .kpi-grid{grid-template-columns:repeat(2,1fr)} .kpi-val{font-size:1.3em} }
</style>
</head>
<body>

<div class="header">
  <span class="dot" id="dot"></span>
  <h1>Limitless Agent Dashboard</h1>
</div>
<div class="meta">
  <span id="wallet"></span>
  <span id="ts"></span>
  <a href="https://limitless.exchange" target="_blank">limitless.exchange ↗</a>
</div>

<!-- KPIs -->
<div class="kpi-grid">
  <div class="kpi" id="kpi-balance">
    <div class="kpi-val a" id="v-balance">--</div>
    <div class="kpi-label">Balance</div>
    <div class="kpi-sub" id="v-balance-sub"></div>
  </div>
  <div class="kpi" id="kpi-pnl">
    <div class="kpi-val" id="v-pnl">--</div>
    <div class="kpi-label">Realized P&L</div>
    <div class="kpi-sub" id="v-pnl-sub"></div>
  </div>
  <div class="kpi" id="kpi-wr">
    <div class="kpi-val" id="v-wr">--</div>
    <div class="kpi-label">Win Rate</div>
    <div class="kpi-sub" id="v-wr-sub"></div>
  </div>
  <div class="kpi" id="kpi-pos">
    <div class="kpi-val a" id="v-pos">--</div>
    <div class="kpi-label">Open Positions</div>
    <div class="kpi-sub" id="v-pos-sub"></div>
  </div>
  <div class="kpi" id="kpi-trades">
    <div class="kpi-val cy" id="v-trades">--</div>
    <div class="kpi-label">Trades</div>
    <div class="kpi-sub" id="v-trades-sub"></div>
  </div>
</div>

<!-- Row 1: Chart + Strategy Config -->
<div class="two-col">
  <div class="panel">
    <div class="panel-title">Cumulative P&L</div>
    <div id="pnl-chart"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Strategy Config</div>
    <div id="config-grid" class="config-grid">
      <div class="empty-msg">Loading...</div>
    </div>
  </div>
</div>

<!-- Row 2: Per-Asset Performance + Positions -->
<div class="two-col">
  <div class="panel">
    <div class="panel-title">Fill Rate by Asset <span class="count" id="asset-count"></span></div>
    <div id="asset-bars"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Open Positions <span class="count" id="pos-count"></span></div>
    <div class="scroll-wrap">
      <table>
        <thead><tr><th>Market</th><th>Side</th><th>Size</th><th>Entry</th></tr></thead>
        <tbody id="tbl-pos"></tbody>
      </table>
    </div>
    <div id="pos-empty" class="empty-msg">No open positions</div>
  </div>
</div>

<!-- Row 3: Recent Trades (full width) -->
<div class="panel" style="margin-bottom:16px">
  <div class="panel-title">Recent Trades <span class="count" id="trade-count"></span></div>
  <div class="scroll-wrap">
    <table>
      <thead><tr><th>Time</th><th>Market</th><th>Side</th><th>$</th><th>Edge</th><th>Status</th></tr></thead>
      <tbody id="tbl-trades"></tbody>
    </table>
  </div>
  <div id="trades-empty" class="empty-msg">No trades yet</div>
</div>

<script>
const $ = id => document.getElementById(id);
const trunc = (s,n) => !s||typeof s!=='string'?'—':s.length>n?s.slice(0,n-1)+'…':s;
const fmtUsd = v => { const n=parseFloat(v)||0; return (n>=0?'+':'')+n.toFixed(2); };
const pnlCls = v => parseFloat(v)>=0?'g':'r';

function drawChart(el, data) {
  if(!data||!data.length) {
    el.innerHTML='<div class="empty-msg">No resolved trades yet</div>';
    return;
  }
  const vals=data.map(d=>d.pnl);
  const mn=Math.min(0,...vals), mx=Math.max(.01,...vals), rng=mx-mn||1;
  const pts=data.map((d,i)=>{
    const x=(i/(data.length-1||1))*100;
    const y=100-((d.pnl-mn)/rng)*100;
    return `${x},${y}`;
  }).join(' ');
  const last=vals[vals.length-1];
  const zy=100-((0-mn)/rng)*100;
  const col=last>=0?'var(--green)':'var(--red)';
  const fill=last>=0?'rgba(0,232,123,.06)':'rgba(255,68,102,.06)';
  el.innerHTML=`
<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:100%">
  <line x1="0" y1="${zy}" x2="100" y2="${zy}" stroke="var(--border)" stroke-width=".3" stroke-dasharray="1,1"/>
  <polygon points="0,${zy} ${pts} 100,${zy}" fill="${fill}"/>
  <polyline points="${pts}" fill="none" stroke="${col}" stroke-width=".8" vector-effect="non-scaling-stroke"/>
  <circle cx="${data.length>1?100:50}" cy="${100-((last-mn)/rng)*100}" r="1.5" fill="${col}"/>
</svg>
<div style="position:absolute;top:8px;left:12px;font-size:1.3em;font-weight:800;color:${col}">${fmtUsd(last)}</div>
<div style="position:absolute;top:10px;right:12px;font-size:.6em;color:var(--dim2)">${data.length} trades</div>`;
}

function renderBars(el, assets) {
  if(!assets||!Object.keys(assets).length) { el.innerHTML='<div class="empty-msg">No data yet</div>'; return; }
  const sorted=Object.entries(assets).sort((a,b)=>(b[1].wins+b[1].losses)-(a[1].wins+a[1].losses));
  el.innerHTML=sorted.map(([name,d])=>{
    const w=d.wins||0, l=d.losses||0, tot=w+l;
    const wr=tot?Math.round(w/tot*100):0;
    const wp=tot?(w/tot*100):0, lp=tot?(l/tot*100):0;
    const pnl=d.pnl||0;
    return `<div class="bar-row">
      <span class="bar-label">${name}</span>
      <div class="bar-track">
        <div class="bar-w" style="width:${wp}%">${w?w+'✓':''}</div>
        <div class="bar-l" style="width:${lp}%">${l?l+'✗':''}</div>
      </div>
      <span class="bar-stat">${wr}% fill &middot; $${pnl.toFixed(0)} vol</span>
    </div>`;
  }).join('');
}

async function load() {
  try {
    const r=await fetch('/api/dashboard');
    if(!r.ok) throw new Error(r.status);
    const d=await r.json();
    const now=new Date();

    // Meta
    $('ts').textContent=now.toLocaleTimeString()+' · '+now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const w=d.wallet||'';
    if(w) $('wallet').textContent=w.slice(0,6)+'…'+w.slice(-4);

    // KPI: Balance
    const wb=parseFloat(d.walletBalance)||0, pv=parseFloat(d.positionValue)||0, bal=wb+pv;
    $('v-balance').textContent='$'+bal.toFixed(2);
    $('v-balance-sub').textContent='wallet $'+wb.toFixed(2)+' · positions $'+pv.toFixed(2);

    // KPI: P&L
    const pnl=parseFloat(d.totalPnl)||0;
    $('v-pnl').textContent=fmtUsd(pnl);
    $('v-pnl').className='kpi-val '+(pnl>=0?'g':'r');
    $('kpi-pnl').className='kpi '+(pnl>=0?'glow-green':'glow-red');
    $('v-pnl-sub').textContent=d.pnlSource||'';

    // KPI: Win Rate
    const wr=parseFloat(d.winRate)||0;
    const wins=d.wins||0, losses=d.losses||0;
    $('v-wr').textContent=wr.toFixed(1)+'%';
    $('v-wr').className='kpi-val '+(wr>=55?'g':wr>=45?'a':'r');
    $('v-wr-sub').textContent=wins+'W / '+losses+'L';

    // KPI: Positions
    const pos=d.positions||[];
    const activePos=pos.filter(p=>parseFloat(p.size||0)>0);
    $('v-pos').textContent=activePos.length;
    $('v-pos-sub').textContent=pos.length+' total tracked';

    // KPI: Trades
    const trades=d.trades||[];
    const filled=trades.filter(t=>t.filled||t.success);
    $('v-trades').textContent=filled.length+'/'+trades.length;
    $('v-trades-sub').textContent=filled.length+' filled, '+(trades.length-filled.length)+' missed';

    // Chart
    drawChart($('pnl-chart'), d.cumPnl||[]);

    // Strategy Config
    const cfg=d.strategyConfig||{};
    const cfgKeys=Object.keys(cfg);
    if(cfgKeys.length) {
      $('config-grid').innerHTML=cfgKeys.map(k=>
        `<div class="config-item"><span class="config-key">${k}</span><span class="config-val">${cfg[k]}</span></div>`
      ).join('');
    } else {
      $('config-grid').innerHTML='<div class="empty-msg">No strategy running</div>';
    }

    // Asset bars
    const assets=d.byAsset||{};
    $('asset-count').textContent=Object.keys(assets).length?'('+Object.keys(assets).length+')':'';
    renderBars($('asset-bars'), assets);

    // Positions table
    $('pos-count').textContent=activePos.length?'('+activePos.length+')':'';
    $('pos-empty').style.display=activePos.length?'none':'block';
    $('tbl-pos').innerHTML=activePos.map(p=>{
      const side=p.side||'—';
      const url=p.marketSlug?'https://limitless.exchange/markets/'+p.marketSlug:null;
      const link=url?`<a href="${url}" target="_blank">${trunc(p.marketTitle||p.marketSlug,30)} ↗</a>`:trunc(p.marketTitle,30);
      return `<tr>
        <td>${link}</td>
        <td><span class="badge ${side==='YES'?'b-yes':'b-no'}">${side}</span></td>
        <td>${p.size!=null?'$'+parseFloat(p.size).toFixed(2):'—'}</td>
        <td class="d">${p.fillPrice!=null?p.fillPrice+'¢':'—'}</td>
      </tr>`;
    }).join('');

    // Trades table
    const trades=d.trades||[];
    $('trade-count').textContent=trades.length?'('+trades.length+')':'';
    $('trades-empty').style.display=trades.length?'none':'block';
    $('tbl-trades').innerHTML=trades.slice(0,50).map(t=>{
      const ts=t.timestamp?new Date(t.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'?';
      const side=t.side||'—';
      const title=typeof t.marketTitle==='string'?t.marketTitle:t.marketSlug||'—';
      const amt=parseFloat(t.tradeAmountUSD||t.amountUsd||0);
      const edge=t.edgePercent!=null?(parseFloat(t.edgePercent).toFixed(0)+'%'):'—';
      const filled=t.filled||t.success;
      const statusBadge=filled?'<span class="badge b-ok">filled</span>':'<span class="badge b-err">miss</span>';
      return `<tr>
        <td class="d">${ts}</td>
        <td>${trunc(title,24)}</td>
        <td><span class="badge ${side==='YES'?'b-yes':'b-no'}">${side}</span></td>
        <td>$${amt.toFixed(2)}</td>
        <td class="d">${edge}</td>
        <td>${statusBadge}</td>
      </tr>`;
    }).join('');

    // (Claimable removed — auto-claimed by bot)

    // Dot green
    $('dot').className='dot';
  } catch(e) {
    $('ts').textContent='ERROR: '+e.message;
    $('dot').className='dot dead';
  }
}

// SSE
const es=new EventSource('/api/events');
es.onmessage=ev=>{try{const d=JSON.parse(ev.data);if(d.type==='update')load();}catch{}};
es.onerror=()=>{$('dot').className='dot dead'};
es.onopen=()=>{$('dot').className='dot'};

load();
setInterval(load,30000);
</script>
</body>
</html>
