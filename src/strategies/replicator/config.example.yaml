# Replicator strategy config.
#
# Copy this to ./replicator.config.yaml (or set REPLICATOR_CONFIG_PATH) and
# edit. Secrets live in .env, never here: PRIVATE_KEY + a Limitless scoped
# HMAC token (LMTS_TOKEN_ID + LMTS_TOKEN_SECRET). See .env.example.
#
# Strategy: mirror Polymarket orderbook liquidity onto Limitless as
# BUY-only YES + NO limit orders. Hedge accumulated exposure with FAK
# orders on Polymarket. See src/strategies/replicator/README.md for the
# full architecture + invariants.

# --- Polymarket wallet ------------------------------------------------------
# Polymarket's collateral is pUSD on the V2 exchange; this bot uses
# @polymarket/clob-client-v2. The funder is the address that holds your pUSD:
#   - New API users (default): deposit wallet address → poly_signature_type: 3 (POLY_1271)
#   - Existing Gnosis Safe users: your Safe address    → poly_signature_type: 2
# Find the address in Polymarket's UI under your account (settings). The
# "for API use only, do not send funds" address is your SIGNER EOA, not the
# funder. If you see "maker address not allowed" at boot, the sig type is wrong.
poly_funder: "0xYourPolymarketFunderAddress"
poly_signature_type: 3

# --- Trading parameters -----------------------------------------------------
order_size: 100        # shares per order (same N on YES and NO sides)
margin_bps: 100        # how much *inside* the Poly price we quote (100 = 1%)
hedge_threshold: 2.0   # hedge when |net exposure| in shares exceeds this
hedge_interval: 5      # seconds between hedge ticks

# --- Safety -----------------------------------------------------------------
# Strongly recommended for your first run. Overridden by DRY_RUN env var.
dry_run: true

# --- Market pairs ----------------------------------------------------------
# Each pair maps one Polymarket slug to one Limitless slug.
# Both slugs must point to an *equivalent* market — same asset, same
# threshold, same UTC moment, same data source. Title overlap is NOT
# enough; verify resolution criteria match before going live.
#
# Discover candidates: `npm run replicator:find-pairs`
#
# The pair below is a placeholder — REPLACE before running. Run find-pairs.
market_pairs:
  - polymarket_slug: "REPLACE-ME-poly-market-slug"
    limitless_slug:  "REPLACE-ME-limitless-market-slug"
