# Replicator strategy config.
#
# Copy this to ./replicator.config.yaml (or set REPLICATOR_CONFIG_PATH) and
# edit. Secrets live in .env, never here: PRIVATE_KEY + a Limitless scoped
# HMAC token (LMTS_TOKEN_ID + LMTS_TOKEN_SECRET). See .env.example.
#
# Strategy: mirror Polymarket orderbook liquidity onto Limitless as
# BUY-only YES + NO limit orders. Hedge accumulated exposure with FAK
# orders on Polymarket. See src/strategies/replicator/SKILL.md for the
# full architecture + invariants.

# --- Polymarket wallet ------------------------------------------------------
# Polymarket's collateral is pUSD on the V2 exchange; this bot uses
# @polymarket/clob-client-v2. The funder is the address that holds your pUSD:
#   - New API users (default): deposit wallet address → poly_signature_type: 3 (POLY_1271)
#   - Existing Gnosis Safe users: your Safe address    → poly_signature_type: 2
# Find the address in Polymarket's UI under your account (settings). The
# "for API use only, do not send funds" address is your SIGNER EOA, not the
# funder. If you see "maker address not allowed" at boot, the sig type is wrong.
poly_funder: "0xYourPolymarketFunderAddress"
poly_signature_type: 3

# --- Trading parameters -----------------------------------------------------
order_size: 5          # shares per order (same N on YES and NO sides) — start small
margin_bps: 100        # how much *inside* the Poly price we quote (100 = 1%)
hedge_threshold: 2.0   # hedge when |net exposure| in shares exceeds this
hedge_interval: 5      # seconds between hedge ticks
# After a hedge fires on a pair, don't hedge that pair again for this long. The
# Polymarket data-api position read lags a fill by several seconds, so without
# this the hedger re-reads a stale (pre-hedge) position and fires the SAME hedge
# again — over-trading, then over-correcting. Must exceed the settle lag; 12s
# (~2× observed) is safe. Seen live: a single 4.9-share fill triggered 3 hedges
# ($8.4 of Poly buys for a ~$3.4 need) before this gate was added.
hedge_settle_ms: 12000
# Floor on re-quote frequency PER PAIR (ms). Cancel-replace still fires every
# tick, but coalesces bursts to at most one cycle per this interval (always
# quoting the freshest book). The Polymarket book ticks many times/sec, so
# without this an unthrottled multi-pair run trips the Limitless API's
# Cloudflare rate-limit (429/1015) on sustained runs. 2000ms keeps a 3-pair run
# comfortably under the limit. Lower only for a single pair, watching for 429s.
min_requote_ms: 2000

# --- Safety -----------------------------------------------------------------
# Hard loss circuit-breaker: if marked equity (pUSD + Base USDC + position
# value) drops this many dollars below the run's starting equity, the bot
# cancels all orders and halts. Also settable via REPLICATOR_MAX_LOSS_USD.
max_loss_usd: 10

# On a stop (Ctrl-C OR a tripped breaker), also SELL held inventory back to flat
# on BOTH venues, not just cancel resting orders. Default true: a fill that
# already hedged leaves a position on each venue, and cancelling orders alone
# would walk away with unhedged directional inventory. Set false only if you
# deliberately want to leave positions in place on stop.
flatten_on_stop: true

# dry_run: true logs intents and signs nothing. Keep it true until you've run
# `npm run replicator:preflight` and watched a dry run. NOTE: the DRY_RUN env
# var (e.g. in .env) OVERRIDES this — to go live, set dry_run: false AND make
# sure DRY_RUN is not set/true in your environment.
dry_run: true

# --- Market pairs ----------------------------------------------------------
# Each pair maps one Polymarket slug to one Limitless slug.
# Both slugs must point to an *equivalent* market — same asset, same
# threshold, same UTC moment, same data source. Title overlap is NOT
# enough; verify resolution criteria match before going live.
#
# Discover candidates: `npm run replicator:find-pairs`
#
# The pair below is a placeholder — REPLACE before running. Run find-pairs.
market_pairs:
  - polymarket_slug: "REPLACE-ME-poly-market-slug"
    limitless_slug:  "REPLACE-ME-limitless-market-slug"
