name: CI

# Gates every PR (incl. Dependabot SDK/dep bumps) on type-check + tests.
# The SDK-surface test (tests/unit/sdk-surface.test.ts) makes a breaking
# @limitless-exchange/sdk change fail here instead of at a live run.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
